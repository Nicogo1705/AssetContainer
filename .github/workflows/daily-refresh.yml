name: Daily refresh

# Incremental daily refresh of index.lock.json:
#   - detects which assets' tracked ref moved (via git ls-remote — no clone) and re-fetches ONLY those,
#   - refreshes GitHub stars and tag versions for every asset (cheap, API/ls-remote).
# Scales to many assets: on a quiet day nothing is cloned. The event-driven full build
# (build-index.yml) still runs on registry changes.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout registry
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout assetstore tool
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Nicogo1705/AssetStore
          # Pinned on purpose (contents: write job) — keep in sync with build-index.yml / validate.yml.
          ref: 84c6c1e17969416c20fa7d720fd04e27a2ec7daa # v1.0.1
          path: tool

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Incremental refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet run --project tool/src/AssetStore.Cli/AssetStore.Cli.csproj -c Release -- \
            build-index --container . --source git --cache .cache --incremental --stars --out index.lock.json

      - name: Commit updated index
        run: |
          git config user.name  "asset-store-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily incremental index refresh [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Report API rate limit budget
        if: always()
        # Watch this as the catalog grows: when `remaining` gets low (~100+ assets),
        # switch the stars refresh to ETags/GraphQL batching.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/rate_limit \
            | jq -r '.resources.core | "x-ratelimit remaining: \(.remaining)/\(.limit) (resets \(.reset | todate))"'
