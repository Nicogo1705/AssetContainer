name: Build index.lock.json

# On merge to main, regenerate the aggregate consumed by the app.
# Crawls every registry/ entry, enriches it (hash, Stride version, resolved deps)
# and commits index.lock.json.

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "catalog/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate index
        run: |
          echo "TODO (Phase 1/2): assetstore build-index --out index.lock.json"

      - name: Commit updated index
        run: |
          git config user.name  "asset-store-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.lock.json
          git diff --staged --quiet || git commit -m "chore: rebuild index.lock.json"
          git push
