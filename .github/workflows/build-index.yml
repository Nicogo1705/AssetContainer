name: Build index.lock.json

# On merge to main, regenerate the aggregate consumed by the app by crawling every
# registry entry (clone, hash, detect Stride version, resolve dependencies) and commit it.

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "catalog/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared with daily-refresh.yml so the two never run at once; don't cancel an in-flight
  # refresh — let it finish, then this runs (a full rebuild supersedes it anyway).
  group: build-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout registry
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history: the tool reads each entry's creation date (addedAt) via git log.
          fetch-depth: 0

      - name: Checkout assetstore tool
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Nicogo1705/AssetStore
          # Pinned on purpose: this job runs the tool with `contents: write` on the registry,
          # so a broken/compromised AssetStore main must not be picked up silently.
          # Bump deliberately via PR after reviewing the tool's changes.
          ref: 84c6c1e17969416c20fa7d720fd04e27a2ec7daa # v1.0.1
          path: tool

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Build index
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          dotnet run --project tool/src/AssetStore.Cli/AssetStore.Cli.csproj -c Release -- \
            build-index --container . --source git --cache .cache --stars --out index.lock.json

      - name: Commit updated index
        run: |
          git config user.name  "asset-store-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild index.lock.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
