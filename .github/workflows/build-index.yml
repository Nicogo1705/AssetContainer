name: Build index.lock.json

# On merge to main, regenerate the aggregate consumed by the app by crawling every
# registry entry (clone, hash, detect Stride version, resolve dependencies) and commit it.

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "catalog/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Checkout assetstore tool
        uses: actions/checkout@v4
        with:
          repository: Nicogo1705/AssetStore
          path: tool
          token: ${{ secrets.ASSETSTORE_PAT }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Authenticate git for asset clones
        env:
          PAT: ${{ secrets.ASSETSTORE_PAT }}
        run: |
          git config --global url."https://x-access-token:${PAT}@github.com/".insteadOf "https://github.com/"

      - name: Build index
        run: |
          dotnet run --project tool/src/AssetStore.Cli/AssetStore.Cli.csproj -c Release -- \
            build-index --container . --source git --cache .cache --out index.lock.json

      - name: Commit updated index
        run: |
          git config user.name  "asset-store-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.lock.json
          git diff --staged --quiet || git commit -m "chore: rebuild index.lock.json [skip ci]"
          git push
