name: Validate PR

# Validates every registry entry on a pull request: schemas, clone + pin commit,
# AssetData hash, Stride version, and dependency consistency. Runs the `assetstore` CLI.

on:
  pull_request:
    paths:
      - "registry/**"
      - "schemas/**"
      - "catalog/**"

permissions:
  contents: read
  pull-requests: write

# Supersede in-flight runs when a PR is updated, so only the latest push is validated.
concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout assetstore tool
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: Nicogo1705/AssetStore
          # Pinned on purpose — keep in sync with build-index.yml / daily-refresh.yml.
          ref: 84c6c1e17969416c20fa7d720fd04e27a2ec7daa # v1.0.1
          path: tool

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine changed assets
        id: changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A PR is judged on the registry entries it touches, not the whole catalog
          # (so an intentionally-broken demo asset can't fail unrelated PRs).
          only=$(gh pr view "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" \
                   --json files -q '.files[].path' \
                 | grep -E '^registry/.*\.json$' \
                 | sed -E 's#registry/(.*)\.json#--only \1#' \
                 | tr '\n' ' ')
          echo "only=$only" >> "$GITHUB_OUTPUT"
          echo "Scoped to: ${only:-<all assets>}"

      - name: Validate
        id: validate
        # Only run per-asset validation when the PR actually touches registry entries. A schema/catalog-only
        # PR would otherwise validate EVERY asset (cloning each repo), so one transiently offline asset could
        # fail an unrelated change.
        if: steps.changed.outputs.only != ''
        run: |
          set -o pipefail
          dotnet run --project tool/src/AssetStore.Cli/AssetStore.Cli.csproj -c Release -- \
            validate --container . --source git --cache .cache ${{ steps.changed.outputs.only }} | tee validate.out

      - name: Comment results on PR
        if: always()
        # Fork PRs get a read-only GITHUB_TOKEN, so commenting 403s — don't fail the run over it.
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.existsSync('validate.out') ? fs.readFileSync('validate.out', 'utf8') : 'No registry entries changed — per-asset validation skipped.';
            // Strip any residual ANSI escape codes so the comment reads cleanly.
            const body = raw.replace(/\x1b\[[0-9;]*m/g, '');
            const outcome = '${{ steps.validate.outcome }}';
            const status = outcome === 'success' ? '✅ Validation passed'
              : outcome === 'skipped' ? 'ℹ️ No registry entries changed — per-asset validation skipped'
              : '❌ Validation failed';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ${status}\n\n\`\`\`\n${body.slice(0, 60000)}\n\`\`\``,
            });
