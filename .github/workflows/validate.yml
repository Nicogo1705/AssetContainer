name: Validate PR

# Validates every registry entry on a pull request: schemas, clone + pin commit,
# AssetData hash, Stride version, and dependency consistency. Runs the `assetstore` CLI.

on:
  pull_request:
    paths:
      - "registry/**"
      - "schemas/**"
      - "catalog/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4

      - name: Checkout assetstore tool
        uses: actions/checkout@v4
        with:
          repository: Nicogo1705/AssetStore
          path: tool

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Validate
        id: validate
        run: |
          set -o pipefail
          dotnet run --project tool/src/AssetStore.Cli/AssetStore.Cli.csproj -c Release -- \
            validate --container . --source git --cache .cache | tee validate.out

      - name: Comment results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('validate.out') ? fs.readFileSync('validate.out', 'utf8') : 'No output.';
            const status = '${{ steps.validate.outcome }}' === 'success' ? '✅ Validation passed' : '❌ Validation failed';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ${status}\n\n\`\`\`\n${body.slice(0, 60000)}\n\`\`\``,
            });
